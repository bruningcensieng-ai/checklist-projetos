<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist — PPCI / CBMSC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:    #141412;
    --bg2:   #1e1e1b;
    --bg3:   #252521;
    --text:  #e8e5de;
    --text2: #8a887f;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --green: #1D9E75;
    --red:   #E24B4A;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'DM Sans', system-ui, sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 3rem; }
  .container { max-width: 780px; margin: 0 auto; }

  .back-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); text-decoration: none; margin-bottom: 1.5rem; transition: color .15s; }
  .back-link:hover { color: var(--text); }

  .page-header { margin-bottom: 1.75rem; }
  .page-header h1 { font-size: 20px; font-weight: 500; color: var(--text); }
  .page-header p  { font-size: 13px; color: var(--text2); margin-top: 3px; }

  .proj-bar { display: flex; gap: 10px; margin: 1.25rem 0; flex-wrap: wrap; }
  .proj-bar input { flex: 1; min-width: 180px; font-size: 13px; padding: 7px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); background: var(--bg2); color: var(--text); font-family: var(--font); }
  .proj-bar input::placeholder { color: var(--text2); }
  .proj-bar input:focus { outline: none; border-color: rgba(255,255,255,0.3); }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat { background: var(--bg2); border-radius: var(--radius-md); padding: 10px 14px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-val.ok  { color: #1D9E75; }
  .stat-val.nok { color: #E24B4A; }

  .prog-bg   { background: var(--bg3); border-radius: 99px; height: 5px; margin-bottom: 1.25rem; }
  .prog-fill { height: 5px; border-radius: 99px; background: var(--green); transition: width .35s; }

  .section { margin-bottom: 8px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .sec-hdr { display: flex; align-items: center; gap: 10px; padding: 9px 13px; cursor: pointer; background: var(--bg2); user-select: none; transition: background .12s; }
  .sec-hdr:hover { background: var(--bg3); }
  .sec-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .sec-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .sec-ref { font-size: 10px; color: var(--text2); }
  .sec-badge { font-size: 11px; color: var(--text2); margin-left: 4px; }
  .chev { font-size: 10px; color: var(--text2); transition: transform .2s; display: inline-block; }
  .chev.open { transform: rotate(90deg); }

  .sec-items { display: none; border-top: 0.5px solid var(--border); }
  .sec-items.open { display: block; }

  .item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 13px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background .1s; }
  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--bg3); }

  .cb { width: 16px; height: 16px; min-width: 16px; border: 1.5px solid var(--border2); border-radius: 3px; display: flex; align-items: center; justify-content: center; margin-top: 2px; flex-shrink: 0; transition: all .15s; }
  .cb.ok   { background: var(--green); border-color: var(--green); }
  .cb.fail { background: var(--red);   border-color: var(--red); }
  .cb svg  { display: none; }
  .cb.ok svg, .cb.fail svg { display: block; }

  .item-body { flex: 1; }
  .item-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .item-code { font-size: 11px; color: var(--text2); font-weight: 500; margin-right: 5px; }
  .item-ref  { font-size: 10px; color: var(--text2); margin-left: 5px; }
  .tag-crit  { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 4px; background: #2e1208; color: #e07050; margin-left: 5px; vertical-align: middle; }

  .obs-wrap { padding: 4px 0 6px 0; }
  .obs-input { width: 100%; font-size: 12px; padding: 5px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); background: var(--bg3); color: var(--text); resize: none; font-family: var(--font); }
  .obs-input::placeholder { color: var(--text2); }
  .obs-input:focus { outline: none; border-color: rgba(255,255,255,0.3); }

  .footer-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; flex-wrap: wrap; }
  .btn { font-size: 12px; color: var(--text2); cursor: pointer; border: 0.5px solid var(--border2); border-radius: var(--radius-md); padding: 6px 14px; background: none; font-family: var(--font); transition: background .15s; }
  .btn:hover { background: var(--bg3); color: var(--text); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
  .btn-primary:hover { opacity: .85; background: var(--text); }

  @media print {
    body { background: #fff; color: #000; }
    .back-link, .footer-row, .proj-bar { display: none; }
    .sec-items { display: block !important; }
    .sec-hdr { background: #f5f5f5; }
  }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← Voltar ao início</a>

  <div class="page-header">
    <h1>Checklist pré-análise — PPCI / CBMSC</h1>
    <p>Projeto de Prevenção Contra Incêndio e Pânico · Santa Catarina</p>
  </div>

  <div class="proj-bar">
    <input id="proj-nome" placeholder="Nome / endereço do projeto" />
    <input id="proj-rt"   placeholder="Responsável técnico" style="flex:0 1 240px" />
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total de itens</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Conformes</div><div class="stat-val ok" id="s-ok">0</div></div>
    <div class="stat"><div class="stat-label">Não conformes</div><div class="stat-val nok" id="s-nok">0</div></div>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <div id="sections"></div>

  <div class="footer-row">
    <button class="btn" onclick="resetAll()">↺ Limpar tudo</button>
    <button class="btn" onclick="window.print()">⎙ Imprimir</button>
    <button class="btn btn-primary" onclick="gerarRelatorio()">Gerar relatório ↗</button>
  </div>
</div>

<script>
const BLOCKS = [
  { id:'b1', color:'#378ADD', label:'Documentação e composição do PPCI', ref:'IN 01', items:[
    { code:'1.1', text:'Folha de rosto / capa com dados completos do imóvel', crit:false },
    { code:'1.2', text:'Identificação do responsável técnico (nome, CREA/CAU, DRT)', crit:false },
    { code:'1.3', text:'ART/RRT anotada e anexada', crit:true },
    { code:'1.4', text:'Planta de situação presente', crit:false },
    { code:'1.5', text:'Planta baixa de todos os pavimentos presentes', crit:false },
    { code:'1.6', text:'Cortes e fachadas (quando exigidos)', crit:false },
    { code:'1.7', text:'Memorial descritivo completo', crit:false },
    { code:'1.8', text:'Planilhas de dimensionamento dos sistemas (quando aplicável)', crit:false },
    { code:'1.9', text:'Especificações dos materiais e equipamentos', crit:false },
  ]},
  { id:'b2', color:'#E24B4A', label:'Consistência entre documentos', ref:'IN 01', items:[
    { code:'2.1', text:'Nomenclatura dos blocos na planta de situação igual ao sistema do CBMSC', crit:true },
    { code:'2.2', text:'Dados do selo (carimbo) completos em todas as pranchas — nome do proprietário, endereço completo, número do processo, datas, número e total de pranchas, revisões e assinatura do RT', crit:true },
    { code:'2.3', text:'Dados do selo idênticos em todas as pranchas — conferir se não há divergência entre pranchas diferentes', crit:true },
    { code:'2.4', text:'Altura da edificação informada no memorial descritivo confere com a altura indicada nas plantas e cortes', crit:true },
    { code:'2.5', text:'Área total da edificação igual no memorial e nas plantas', crit:true },
    { code:'2.6', text:'Classificação de ocupação/uso igual em todos os documentos', crit:true },
    { code:'2.7', text:'Sistemas preventivos listados no memorial são os mesmos indicados nas plantas', crit:true },
    { code:'2.8', text:'Número de pavimentos igual em todos os documentos', crit:true },
    { code:'2.9', text:'Dimensões e áreas dos ambientes consistentes entre plantas e memorial', crit:false },
  ]},
  { id:'b3', color:'#1D9E75', label:'Qualidade técnica das plantas', ref:'IN 01', items:[
    { code:'3.1', text:'Escala indicada em todas as pranchas (ex: 1:50, 1:100)', crit:false },
    { code:'3.2', text:'Escala adequada para leitura e análise dos desenhos', crit:false },
    { code:'3.3', text:'Norte indicado na planta de situação e implantação', crit:false },
    { code:'3.4', text:'Cotas de nível em todos os ambientes (piso acabado)', crit:true },
    { code:'3.5', text:'Cotas lineares — larguras de corredores, portas, escadas', crit:false },
    { code:'3.6', text:'Material de acabamento de todos os ambientes indicado nas plantas (piso, parede, teto)', crit:true },
    { code:'3.7', text:'Legenda completa com todos os símbolos utilizados', crit:false },
    { code:'3.8', text:'Numeração sequencial de pranchas correta', crit:false },
    { code:'3.9', text:'Revisões das pranchas atualizadas e consistentes', crit:false },
  ]},
  { id:'b4', color:'#BA7517', label:'Saídas de emergência e rotas de fuga', ref:'IN 02', items:[
    { code:'4.1', text:'Largura mínima das saídas de emergência atendida', crit:true },
    { code:'4.2', text:'Distâncias máximas de caminhamento verificadas conforme ocupação', crit:true },
    { code:'4.3', text:'Sentido de abertura das portas de emergência indicado (para fora / saída)', crit:false },
    { code:'4.4', text:'Escadas de emergência com especificações completas (quando exigido)', crit:false },
    { code:'4.5', text:'Sinalização de saída de emergência indicada nas plantas', crit:false },
    { code:'4.6', text:'Largura mínima de corredores de rota de fuga atendida', crit:false },
  ]},
  { id:'b5', color:'#534AB7', label:'Extintores', ref:'IN 06', items:[
    { code:'5.1', text:'Extintores locados em planta em todas as áreas exigidas', crit:true },
    { code:'5.2', text:'Tipo de extintor compatível com a classe de risco do ambiente', crit:true },
    { code:'5.3', text:'Distância máxima de caminhamento respeitada', crit:false },
    { code:'5.4', text:'Quantidade de extintores dimensionada conforme IN 06', crit:false },
    { code:'5.5', text:'Especificação técnica dos extintores no memorial', crit:false },
  ]},
  { id:'b6', color:'#0F6E56', label:'Hidrantes e mangotinhos', ref:'IN 07', items:[
    { code:'6.1', text:'Sistema locado em planta', crit:false },
    { code:'6.2', text:'Tipo de sistema compatível com ocupação e área (Tipo 1, 2 ou 3)', crit:true },
    { code:'6.3', text:'Distância máxima de alcance das mangueiras verificada', crit:true },
    { code:'6.4', text:'Reservatório de incêndio (RI) dimensionado e indicado', crit:true },
    { code:'6.5', text:'Bomba de incêndio especificada (quando exigida)', crit:false },
    { code:'6.6', text:'Diâmetro das tubulações indicado nas plantas', crit:false },
    { code:'6.7', text:'Planilha de dimensionamento hidráulico incluída', crit:false },
    { code:'6.8', text:'Pressão e vazão na ponta da mangueira atendidas conforme IN 07', crit:true },
  ]},
  { id:'b7', color:'#D4537E', label:'Iluminação de emergência', ref:'IN 03 / IN 11', items:[
    { code:'7.1', text:'Luminárias de emergência locadas nas rotas de fuga', crit:false },
    { code:'7.2', text:'Locação em escadas, corredores e saídas', crit:false },
    { code:'7.3', text:'Especificação técnica das luminárias (autônoma/centralizada, autonomia mínima)', crit:false },
    { code:'7.4', text:'Nível de iluminamento mínimo atendido (memorial ou planilha)', crit:false },
  ]},
  { id:'b8', color:'#5F5E5A', label:'Memorial descritivo', ref:'IN 01', items:[
    { code:'8.1', text:'Identificação completa do imóvel (endereço, área, ocupação)', crit:false },
    { code:'8.2', text:'Altura da edificação informada e coincide com cortes e plantas', crit:true },
    { code:'8.3', text:'Classificação da edificação (grupo, divisão, carga de incêndio)', crit:false },
    { code:'8.4', text:'Descrição de todos os sistemas preventivos previstos', crit:false },
    { code:'8.5', text:'Referência às INs e normas técnicas utilizadas', crit:false },
    { code:'8.6', text:'Material de acabamento descrito por ambiente', crit:true },
    { code:'8.7', text:'Dados do responsável técnico completos', crit:false },
  ]},
];

const state = {};
BLOCKS.forEach(b=>b.items.forEach(it=>{ state[it.code]={ok:false,fail:false,obs:''}; }));

function updateProgress() {
  let total=0, ok=0, nok=0;
  BLOCKS.forEach(b=>b.items.forEach(it=>{ total++; if(state[it.code].ok)ok++; if(state[it.code].fail)nok++; }));
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-nok').textContent=nok;
  const pct=total?Math.round(ok/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  BLOCKS.forEach(b=>{
    let bc=0,bf=0;
    b.items.forEach(it=>{ if(state[it.code].ok)bc++; if(state[it.code].fail)bf++; });
    const badge=document.getElementById('badge-'+b.id);
    if(badge) badge.textContent=bc+'/'+b.items.length+(bf>0?' · '+bf+' ✗':'');
  });
}

function toggleItem(code) {
  const s=state[code];
  if(!s.ok&&!s.fail){ s.ok=true; }
  else if(s.ok){ s.ok=false; s.fail=true; }
  else { s.fail=false; }
  const cb=document.getElementById('cb-'+code);
  cb.className='cb'+(s.ok?' ok':s.fail?' fail':'');
  const obsWrap=document.getElementById('obs-'+code);
  if(obsWrap) obsWrap.style.display=s.fail?'block':'none';
  updateProgress();
}

function toggleSec(id) {
  const items=document.getElementById('items-'+id);
  const chev=document.getElementById('chev-'+id);
  items.classList.toggle('open');
  chev.classList.toggle('open');
}

function resetAll() {
  if(!confirm('Limpar tudo?')) return;
  BLOCKS.forEach(b=>b.items.forEach(it=>{ state[it.code]={ok:false,fail:false,obs:''}; }));
  document.querySelectorAll('.cb').forEach(el=>el.className='cb');
  document.querySelectorAll('.obs-wrap').forEach(el=>el.style.display='none');
  document.querySelectorAll('.obs-input').forEach(el=>el.value='');
  updateProgress();
}

function gerarRelatorio() {
  const nome=document.getElementById('proj-nome').value||'(não informado)';
  const rt=document.getElementById('proj-rt').value||'(não informado)';
  let total=0,ok=0,nok=0,nv=0;
  BLOCKS.forEach(b=>b.items.forEach(it=>{ total++; if(state[it.code].ok)ok++; else if(state[it.code].fail)nok++; else nv++; }));
  let linhas=[];
  linhas.push('PRÉ-ANÁLISE DE PPCI — '+nome);
  linhas.push('Data: '+new Date().toLocaleDateString('pt-BR'));
  linhas.push('Responsável técnico: '+rt);
  linhas.push('');
  linhas.push('RESUMO');
  linhas.push('Total: '+total+' | Conformes: '+ok+' | Não conformes: '+nok+' | Não verificados: '+nv);
  linhas.push('');
  BLOCKS.forEach(b=>{
    linhas.push('--- '+b.label.toUpperCase()+' ('+b.ref+') ---');
    b.items.forEach(it=>{
      const s=state[it.code];
      const status=s.ok?'✅':s.fail?'❌':'⬜';
      linhas.push(status+' '+it.code+' '+it.text);
      if(s.fail&&s.obs) linhas.push('   → '+s.obs);
    });
    linhas.push('');
  });
  alert('Copie os dados abaixo e cole no Claude para gerar o relatório:\n\n'+linhas.join('\n'));
}

const cont=document.getElementById('sections');
BLOCKS.forEach(b=>{
  const div=document.createElement('div');
  div.className='section';
  div.innerHTML=`
    <div class="sec-hdr" onclick="toggleSec('${b.id}')">
      <div class="sec-dot" style="background:${b.color}"></div>
      <div class="sec-title">${b.label}</div>
      <span class="sec-ref">${b.ref}</span>
      <span class="sec-badge" id="badge-${b.id}">0/${b.items.length}</span>
      <span class="chev" id="chev-${b.id}">▶</span>
    </div>
    <div class="sec-items" id="items-${b.id}">
      ${b.items.map(it=>`
        <div class="item" onclick="toggleItem('${it.code}')">
          <div class="cb" id="cb-${it.code}">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-text">
              <span class="item-code">${it.code}</span>${it.text}${it.crit?'<span class="tag-crit">crítico</span>':''}<span class="item-ref">${b.ref}</span>
            </div>
            <div class="obs-wrap" id="obs-${it.code}" style="display:none">
              <textarea class="obs-input" rows="2" placeholder="Descreva a não conformidade..." oninput="state['${it.code}'].obs=this.value" onclick="event.stopPropagation()"></textarea>
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
  cont.appendChild(div);
});
updateProgress();
</script>
</body>
</html>
